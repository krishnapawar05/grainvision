version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
  
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    # Environment variable to ensure Next.js can talk to the backend container
    environment:
      # CORRECTED URL: Use localhost so the browser can find the backend
      - NEXT_PUBLIC_API_URL=http://localhost:8000